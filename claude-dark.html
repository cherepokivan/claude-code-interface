<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code - Dark Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
        }

        .header {
            background: var(--bg-tertiary);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 18px;
        }

        .icon-btn:hover {
            background: var(--bg-primary);
            border-color: var(--accent);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: var(--border);
        }

        .message {
            display: flex;
            gap: 15px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
            font-size: 18px;
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        }

        .message.assistant .avatar {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        }

        .message-wrapper {
            max-width: 75%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-content {
            padding: 16px 20px;
            border-radius: 12px;
            line-height: 1.7;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 0 4px;
        }

        .message.user .message-meta {
            justify-content: flex-end;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: var(--accent);
            background: var(--bg-primary);
        }

        .input-area {
            padding: 20px 30px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 150px;
            font-family: inherit;
            line-height: 1.5;
        }

        #messageInput::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            gap: 6px;
            padding: 8px 0;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse {
            0%, 80%, 100% {
                transform: scale(0.6);
                opacity: 0.3;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.2s;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            font-size: 20px;
            color: var(--text-primary);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-primary);
        }

        pre {
            background: var(--bg-primary);
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid var(--border);
        }

        code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .inline-code {
            background: var(--bg-primary);
            color: var(--accent);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 18px;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 20px;
            max-width: 600px;
        }

        .suggestion-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .suggestion-card:hover {
            background: var(--bg-primary);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .suggestion-title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .suggestion-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }

            .header h1 {
                font-size: 18px;
            }

            .chat-container {
                padding: 20px 15px;
            }

            .message-wrapper {
                max-width: 85%;
            }

            .input-area {
                padding: 15px;
            }

            .suggestions {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="claude-custom-helper.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="logo">🌙</div>
                <h1>Claude Code Dark</h1>
            </div>
            <div class="header-right">
                <button class="icon-btn" onclick="clearChat()" title="Очистить чат">🗑️</button>
                <button class="icon-btn" onclick="exportChat()" title="Экспорт">💾</button>
                <button class="icon-btn" onclick="openSettings()" title="Настройки">⚙️</button>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">🤖</div>
                <div class="empty-state-text">Привет! Я Claude. Чем могу помочь?</div>
                <div class="suggestions">
                    <div class="suggestion-card" onclick="useSuggestion('Напиши простой веб-сервер на Python')">
                        <div class="suggestion-title">💻 Код</div>
                        <div class="suggestion-desc">Помощь с программированием</div>
                    </div>
                    <div class="suggestion-card" onclick="useSuggestion('Объясни как работает async/await')">
                        <div class="suggestion-title">📚 Обучение</div>
                        <div class="suggestion-desc">Объяснение концепций</div>
                    </div>
                    <div class="suggestion-card" onclick="useSuggestion('Помоги отладить ошибку в коде')">
                        <div class="suggestion-title">🐛 Отладка</div>
                        <div class="suggestion-desc">Поиск и исправление багов</div>
                    </div>
                    <div class="suggestion-card" onclick="useSuggestion('Проверь мой код на безопасность')">
                        <div class="suggestion-title">🔒 Безопасность</div>
                        <div class="suggestion-desc">Анализ кода</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    placeholder="Напиши сообщение..."
                    rows="1"
                    onkeydown="handleKeyPress(event)"
                ></textarea>
                <button class="send-btn" id="sendButton" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ Настройки</h2>
                <button class="close-btn" onclick="closeSettings()">×</button>
            </div>
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" placeholder="sk-ant-...">
            </div>
            <div class="form-group">
                <label for="modelSelect">Модель</label>
                <select id="modelSelect">
                    <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (Рекомендуется)</option>
                    <option value="claude-opus-4-7">Claude Opus 4.7 (Мощнее)</option>
                    <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (Быстрее)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="maxTokens">Максимум токенов</label>
                <input type="number" id="maxTokens" value="4096" min="256" max="8192" step="256">
            </div>
            <div class="button-group">
                <button class="btn btn-secondary" onclick="closeSettings()">Отмена</button>
                <button class="btn btn-primary" onclick="saveSettings()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let apiKey = localStorage.getItem('claude_api_key_dark') || '';
        let settings = JSON.parse(localStorage.getItem('claude_settings_dark') || '{"model": "claude-sonnet-4-6", "maxTokens": 4096}');

        function hideEmptyState() {
            const emptyState = document.getElementById('emptyState');
            if (emptyState) {
                emptyState.style.display = 'none';
            }
        }

        function showEmptyState() {
            const emptyState = document.getElementById('emptyState');
            if (emptyState && conversationHistory.length === 0) {
                emptyState.style.display = 'flex';
            }
        }

        function useSuggestion(text) {
            document.getElementById('messageInput').value = text;
            document.getElementById('messageInput').focus();
        }

        function openSettings() {
            document.getElementById('apiKey').value = apiKey;
            document.getElementById('modelSelect').value = settings.model;
            document.getElementById('maxTokens').value = settings.maxTokens;
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function saveSettings() {
            apiKey = document.getElementById('apiKey').value;
            settings.model = document.getElementById('modelSelect').value;
            settings.maxTokens = parseInt(document.getElementById('maxTokens').value);

            localStorage.setItem('claude_api_key_dark', apiKey);
            localStorage.setItem('claude_settings_dark', JSON.stringify(settings));
            closeSettings();
        }

        function clearChat() {
            if (confirm('Очистить историю чата?')) {
                conversationHistory = [];
                document.getElementById('chatContainer').innerHTML = '';
                showEmptyState();
            }
        }

        function exportChat() {
            if (conversationHistory.length === 0) {
                alert('Нет сообщений для экспорта');
                return;
            }

            const text = conversationHistory.map(msg =>
                `${msg.role === 'user' ? 'Вы' : 'Claude'}: ${msg.content}`
            ).join('\n\n---\n\n');

            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `claude-chat-${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function addMessage(role, content) {
            hideEmptyState();

            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.innerHTML = formatMessage(content);

            const meta = document.createElement('div');
            meta.className = 'message-meta';

            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            meta.innerHTML = `
                <span class="meta-item">🕐 ${time}</span>
                ${role === 'assistant' ? '<button class="action-btn" onclick="copyMessage(this)">📋 Копировать</button>' : ''}
            `;

            wrapper.appendChild(messageContent);
            wrapper.appendChild(meta);
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(wrapper);
            chatContainer.appendChild(messageDiv);

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function copyMessage(btn) {
            const messageContent = btn.closest('.message-wrapper').querySelector('.message-content');
            const text = messageContent.textContent;
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✓ Скопировано';
                setTimeout(() => btn.textContent = '📋 Копировать', 2000);
            });
        }

        function formatMessage(text) {
            // Code blocks
            text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            // Inline code
            text = text.replace(/`([^`]+)`/g, '<span class="inline-code">$1</span>');
            // Bold
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            // Italic
            text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            // Line breaks
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function showLoading() {
            hideEmptyState();

            const chatContainer = document.getElementById('chatContainer');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loadingMessage';

            loadingDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="message-wrapper">
                    <div class="message-content">
                        <div class="loading">
                            <div class="loading-dot"></div>
                            <div class="loading-dot"></div>
                            <div class="loading-dot"></div>
                        </div>
                    </div>
                </div>
            `;

            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoading() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            if (!apiKey) {
                alert('Пожалуйста, настройте API Key в настройках');
                openSettings();
                return;
            }

            const sendButton = document.getElementById('sendButton');
            sendButton.disabled = true;

            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            conversationHistory.push({
                role: 'user',
                content: message
            });

            showLoading();

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: settings.model,
                        max_tokens: settings.maxTokens,
                        messages: conversationHistory
                    })
                });

                removeLoading();

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API Error');
                }

                const data = await response.json();
                const assistantMessage = data.content[0].text;

                conversationHistory.push({
                    role: 'assistant',
                    content: assistantMessage
                });

                addMessage('assistant', assistantMessage);

            } catch (error) {
                removeLoading();
                addMessage('assistant', `❌ Ошибка: ${error.message}\n\nПроверьте API ключ в настройках.`);
                console.error('Error:', error);
            } finally {
                sendButton.disabled = false;
                input.focus();
            }
        }

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Close modal on outside click
        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeSettings();
            }
        });

        // Initialize
        showEmptyState();
    </script>
</body>
</html>
